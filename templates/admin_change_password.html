{% extends "admin_base.html" %}
{% block content %}

<style>
    .password-card {
        max-width: 500px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
    }
    
    input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
    }
    
    input:focus {
        outline: none;
        border-color: var(--blue);
    }
    
    .btn-submit {
        width: 100%;
        padding: 12px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
    }
    
    .btn-submit:hover {
        background: #2563EB;
    }
</style>

<div>
    <h1 style="font-size: 28px; margin-bottom: 24px;">Change Password</h1>
