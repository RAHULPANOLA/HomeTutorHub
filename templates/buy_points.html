{% extends "base.html" %}
{% block content %}

<style>
  .points-container {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
  }
  
  .points-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
  }
  
  .card-header {
    background: linear-gradient(135deg, var(--saffron), var(--saffron-2));
    padding: 30px;
    text-align: center;
    color: white;
  }
  
  .card-header h2 {
    font-family: 'Clash Display', sans-serif;
    font-size: 28px;
    margin: 0 0 8px;
  }
  
  .current-points {
    font-size: 14px;
    opacity: 0.9;
  }
  
  .card-body {
    padding: 32px;
  }
  
  .packages-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 32px;
  }
  
  .package-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  
  .package-card:hover {
    border-color: var(--saffron);
    transform: translateY(-4px);
  }
  
  .package-card.selected {
    border-color: var(--saffron);
    background: var(--saffron-pale);
  }
  
  .package-points {
    font-family: 'Clash Display', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--saffron);
  }
  
  .package-price {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin: 8px 0;
  }
  
  .package-badge {
    position: absolute;
    top: -10px;
    right: 10px;
    background: linear-gradient(135deg, var(--saffron), var(--saffron-2));
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  
  .custom-amount {
    margin-top: 24px;
    padding: 20px;
    background: var(--surface);
    border-radius: 16px;
  }
  
  .amount-input {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 12px;
  }
  
  .amount-input input {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
  }
  
  .btn-pay {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--saffron), var(--saffron-2));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.2s;
  }
  
  .btn-pay:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(232,114,12,0.3);
  }
  
  .note {
    margin-top: 20px;
    padding: 12px;
    background: var(--surface);
    border-radius: 10px;
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
  }
  
  @media (max-width: 640px) {
    .packages-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="points-container">
  <div class="points-card">
    <div class="card-header">
      <h2>💰 Buy Points</h2>
      <p class="current-points">Current Balance: <strong>{{ wallet }}</strong> points</p>
    </div>
    <div class="card-body">
      <div class="packages-grid">
  <div class="package-card" onclick="selectPackage(100, 99, 'basic')">
    <div class="package-points">100</div>
    <div class="package-price">₹99</div>
    <div class="package-badge">BASIC</div>
  </div>
  <div class="package-card" onclick="selectPackage(500, 449, 'popular')">
    <div class="package-points">500</div>
    <div class="package-price">₹449</div>
    <div class="package-badge">POPULAR</div>
  </div>
  <div class="package-card" onclick="selectPackage(1000, 799, 'premium')">
    <div class="package-points">1000</div>
    <div class="package-price">₹799</div>
    <div class="package-badge">PREMIUM</div>
  </div>
</div>
      
      <div class="custom-amount">
        <label style="font-weight: 600;">Custom Amount</label>
        <div class="amount-input">
          <span style="font-size: 20px;">₹</span>
          <input type="number" id="custom_amount" placeholder="Enter amount (min ₹10)" min="10" step="10">
        </div>
      </div>
      
      <button class="btn-pay" onclick="initiatePayment()">
        💳 Proceed to Payment
      </button>
      
      <div class="note">
        <strong>Note:</strong> 1 point = ₹1. Minimum purchase: ₹10<br>
        Payment is processed securely via Razorpay.
      </div>
    </div>
  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  let selectedAmount = 0;
  let selectedPoints = 0;
  let selectedPlan = '';
  
  function selectPackage(points, price, planName) {
    selectedPoints = points;
    selectedAmount = price;
    selectedPlan = planName;
    
    // Update UI
    document.querySelectorAll('.package-card').forEach(card => {
      card.classList.remove('selected');
    });
    event.currentTarget.classList.add('selected');
    
    // Clear custom amount
    document.getElementById('custom_amount').value = '';
  }
  
  document.getElementById('custom_amount').addEventListener('input', function() {
    const amount = parseFloat(this.value);
    if (amount >= 1) {
      selectedAmount = amount;
      selectedPoints = Math.floor(amount);
      selectedPlan = 'custom';
      
      // Remove selection from packages
      document.querySelectorAll('.package-card').forEach(card => {
        card.classList.remove('selected');
      });
    }
  });
  
  async function initiatePayment() {
    if (selectedAmount < 1) {
      alert('Please select a package or enter an amount (minimum Rs.1)');
      return;
    }
    
    // Show loading state
    const btn = document.querySelector('.btn-pay');
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Processing...';
    btn.disabled = true;
    
    try {
      // Create order
      const response = await fetch('/create_razorpay_order', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          amount: selectedAmount
        })
      });
      
      const data = await response.json();
      
      if (!data.success) {
        throw new Error(data.error || 'Failed to create order');
      }
      
      // Open Razorpay Checkout
      const options = {
        key: '{{ RAZORPAY_KEY_ID }}',
        amount: data.amount,
        currency: data.currency,
        name: 'HomeTutorHub',
        description: `Purchase ${selectedPoints} Points`,
        order_id: data.order_id,
        prefill: {
          name: '{{ session.student_name if session.student_name else session.teacher_name }}',
        },
        theme: {
          color: '#E86E0C'
        },
        modal: {
          ondismiss: function() {
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        },
        handler: async function(response) {
          // Verify payment
          const verifyResponse = await fetch('/verify_razorpay_payment', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              amount: selectedAmount
            })
          });
          
          const verifyData = await verifyResponse.json();
          
          if (verifyData.success) {
            alert(`Payment successful! ${selectedPoints} points added.`);
            window.location.reload();
          } else {
            alert('Payment verification failed: ' + (verifyData.error || 'Unknown error'));
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        }
      };
      
      const rzp = new Razorpay(options);
      rzp.open();
      
    } catch (error) {
      console.error('Payment error:', error);
      alert('Payment failed: ' + error.message);
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }
</script>

{% endblock %}
