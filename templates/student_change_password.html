{% extends "base.html" %}
{% block content %}

<style>
  .pwd-page {
    min-height: calc(100vh - 68px - 80px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .pwd-wrap {
    width: 100%;
    max-width: 460px;
  }

  /* ── Card ── */
  .pwd-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(14,15,20,0.04), 0 20px 60px rgba(14,15,20,0.08);
  }

  /* ── Header ── */
  .pwd-card-header {
    background: var(--ink);
    padding: 30px 36px 26px;
    position: relative;
    overflow: hidden;
  }

  .pwd-card-header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--saffron), var(--saffron-2), transparent);
  }

  .pwd-card-header::before {
    content: '';
    position: absolute;
    bottom: -50px; right: -50px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(232,114,12,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-icon {
    width: 44px; height: 44px;
    background: rgba(232,114,12,0.12);
    border: 1px solid rgba(232,114,12,0.2);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    position: relative;
  }

  .header-icon svg {
    width: 20px; height: 20px;
    fill: none; stroke: var(--saffron);
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .pwd-eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--saffron-2);
    margin-bottom: 5px;
    position: relative;
  }

  .pwd-title {
    font-family: 'Clash Display', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.03em;
    margin: 0 0 4px;
    position: relative;
  }

  .pwd-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin: 0;
    position: relative;
  }

  /* ── Body ── */
  .pwd-card-body {
    padding: 28px 36px 34px;
  }

  /* ── Fields ── */
  .field-group { margin-bottom: 18px; }

  .field-label {
    display: block;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin-bottom: 8px;
  }

  .field-wrap { position: relative; }

  .field-icon {
    position: absolute;
    left: 14px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px;
    fill: none; stroke: var(--ink-soft);
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
    transition: stroke 0.15s;
  }

  .field-wrap:focus-within .field-icon { stroke: var(--saffron); }

  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 42px 12px 42px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--ink);
    outline: none;
    appearance: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .field-input::placeholder { color: var(--ink-soft); font-weight: 400; }

  .field-input:focus {
    border-color: var(--saffron);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(232,114,12,0.1);
  }

  /* Strength indicator (new password only) */
  .strength-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-top: 8px;
  }

  .strength-seg {
    height: 3px;
    background: var(--border);
    border-radius: 100px;
    transition: background 0.25s;
  }

  .strength-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-top: 5px;
    text-align: right;
    transition: color 0.25s;
  }

  /* Password toggle */
  .pwd-toggle {
    position: absolute;
    right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; padding: 4px;
    cursor: pointer; color: var(--ink-soft);
    display: flex; align-items: center;
    border-radius: 6px;
    transition: color 0.15s;
  }

  .pwd-toggle:hover { color: var(--ink); }

  .pwd-toggle svg {
    width: 15px; height: 15px;
    fill: none; stroke: currentColor;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* Divider */
  .form-divider {
    height: 1px;
    background: var(--border);
    margin: 22px 0;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn-update {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--saffron) 0%, var(--saffron-2) 100%);
    color: #fff;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14.5px; font-weight: 700;
    padding: 13px 20px;
    border-radius: 12px;
    border: none; cursor: pointer;
    box-shadow: 0 4px 18px rgba(232,114,12,0.3);
    transition: all 0.18s ease;
  }

  .btn-update:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 26px rgba(232,114,12,0.42);
  }

  .btn-update svg {
    width: 15px; height: 15px;
    fill: none; stroke: currentColor;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  }

  .btn-back {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--ink-mid);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px; font-weight: 600;
    padding: 13px 18px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-back:hover {
    border-color: var(--border);
    background: var(--surface-2, #EEECEA);
    color: var(--ink);
    text-decoration: none;
  }

  .btn-back svg {
    width: 14px; height: 14px;
    fill: none; stroke: currentColor;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── Security tip ── */
  .security-tip {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(11,138,111,0.05);
    border: 1px solid rgba(11,138,111,0.15);
    border-radius: 12px;
    padding: 13px 15px;
    margin-top: 18px;
    font-size: 12.5px;
    color: var(--ink-mid);
    line-height: 1.55;
  }

  .security-tip svg {
    width: 15px; height: 15px; flex-shrink: 0;
    fill: none; stroke: var(--teal);
    stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    margin-top: 1px;
  }
</style>

<div class="pwd-page">
  <div class="pwd-wrap">

    <div class="pwd-card">

      <!-- Header -->
      <div class="pwd-card-header">
        <div class="header-icon">
          <svg viewBox="0 0 24 24"><path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        </div>
        <p class="pwd-eyebrow">Security</p>
        <h2 class="pwd-title">Change Password</h2>
        <p class="pwd-subtitle">Keep your account safe with a strong password</p>
      </div>

      <!-- Form -->
      <div class="pwd-card-body">
        <form method="POST" id="pwdForm">

          <!-- Current password -->
          <div class="field-group">
            <label class="field-label" for="current_password">Current Password</label>
            <div class="field-wrap">
              <input
                id="current_password"
                type="password"
                name="current_password"
                placeholder="Enter your current password"
                class="field-input"
                autocomplete="current-password"
                required
              >
              <svg class="field-icon" viewBox="0 0 24 24">
                <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
              <button type="button" class="pwd-toggle" data-target="current_password" aria-label="Show password">
                <svg viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <div class="form-divider"></div>

          <!-- New password -->
          <div class="field-group">
            <label class="field-label" for="new_password">New Password</label>
            <div class="field-wrap">
              <input
                id="new_password"
                type="password"
                name="new_password"
                placeholder="Create a strong new password"
                class="field-input"
                autocomplete="new-password"
                required
                oninput="checkStrength(this.value)"
              >
              <svg class="field-icon" viewBox="0 0 24 24">
                <path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
              </svg>
              <button type="button" class="pwd-toggle" data-target="new_password" aria-label="Show password">
                <svg viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
            <!-- Strength bar -->
            <div class="strength-bar" id="strengthBar">
              <div class="strength-seg" id="seg1"></div>
              <div class="strength-seg" id="seg2"></div>
              <div class="strength-seg" id="seg3"></div>
              <div class="strength-seg" id="seg4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <!-- Confirm password -->
          <div class="field-group">
            <label class="field-label" for="confirm_password">Confirm New Password</label>
            <div class="field-wrap">
              <input
                id="confirm_password"
                type="password"
                name="confirm_password"
                placeholder="Re-enter your new password"
                class="field-input"
                autocomplete="new-password"
                required
                oninput="checkMatch()"
              >
              <svg class="field-icon" viewBox="0 0 24 24">
                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <button type="button" class="pwd-toggle" data-target="confirm_password" aria-label="Show password">
                <svg viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
            <div class="strength-label" id="matchLabel" style="text-align:left; margin-top:6px;"></div>
          </div>

          <!-- Buttons -->
          <div class="btn-row">
            <a href="/student_login" class="btn-back">
              <svg viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Back
            </a>
            <button type="submit" class="btn-update">
              <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              Update Password
            </button>
          </div>

        </form>

        <!-- Security tip -->
        <div class="security-tip">
          <svg viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Use at least 8 characters with a mix of uppercase letters, numbers, and symbols for a strong password.
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  // Password visibility toggles
  document.querySelectorAll('.pwd-toggle').forEach(btn => {
    const eyeOpen   = `<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
    const eyeClosed = `<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;

    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = show ? eyeClosed : eyeOpen;
      btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });
  });

  // Password strength
  function checkStrength(val) {
    const segs   = [seg1, seg2, seg3, seg4];
    const label  = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8)            score++;
    if (/[A-Z]/.test(val))          score++;
    if (/[0-9]/.test(val))          score++;
    if (/[^A-Za-z0-9]/.test(val))   score++;

    const colors = ['#e74c3c','#e67e22','#f1c40f','#27ae60'];
    const labels = ['Weak','Fair','Good','Strong'];

    segs.forEach((s, i) => {
      s.style.background = i < score ? colors[score - 1] : 'var(--border)';
    });

    label.textContent = val.length ? labels[score - 1] || '' : '';
    label.style.color = val.length ? colors[score - 1] : 'var(--ink-soft)';
  }

  // Confirm match
  function checkMatch() {
    const newVal  = document.getElementById('new_password').value;
    const confVal = document.getElementById('confirm_password').value;
    const label   = document.getElementById('matchLabel');
    if (!confVal) { label.textContent = ''; return; }
    if (newVal === confVal) {
      label.textContent = '✓ Passwords match';
      label.style.color = 'var(--teal)';
    } else {
      label.textContent = '✗ Passwords do not match';
      label.style.color = '#e74c3c';
    }
  }
</script>

{% endblock %}
