<!DOCTYPE html><html dir="ltr" class="jodit" lang="en"><head><title>Jodit Editor</title><style>html{margin:0;padding:0;min-height: 100%;}body{box-sizing:border-box;font-size:13px;line-height:1.6;padding:10px;margin:0;background:transparent;color:#000;position:relative;z-index:2;user-select:auto;margin:0px;overflow:auto;outline:none;}table{width:100%;border:none;border-collapse:collapse;empty-cells: show;max-width: 100%;}th,td{padding: 2px 5px;border:1px solid #ccc;-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}p{margin-top:0;}.jodit_editor .jodit_iframe_wrapper{display: block;clear: both;user-select: none;position: relative;}.jodit_editor .jodit_iframe_wrapper:after {position:absolute;content:"";z-index:1;top:0;left:0;right: 0;bottom: 0;cursor: pointer;display: block;background: rgba(0, 0, 0, 0);} .jodit_disabled{user-select: none;-o-user-select: none;-moz-user-select: none;-khtml-user-select: none;-webkit-user-select: none;-ms-user-select: none}</style></head><body class="jodit-wysiwyg" dir="ltr" style="direction: ltr; min-height: 901px;" spellcheck="false"><p>{% extends "base.html" %}
{% block content %}
</p><style>
    .otp-page { max-width: 450px; margin: 60px auto; padding: 0 20px; }

    .otp-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(14,15,20,0.08);
    }

    /* Header */
    .otp-header {
        background: var(--ink);
        padding: 28px 32px 24px;
        text-align: center;
        position: relative; overflow: hidden;
    }

    .otp-header::after {
        content: '';
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, var(--teal), #0FA882, transparent);
    }

    .otp-header::before {
        content: '';
        position: absolute; bottom: -40px; right: -30px;
        width: 140px; height: 140px;
        background: radial-gradient(circle, rgba(11,138,111,0.14) 0%, transparent 70%);
        pointer-events: none;
    }

    .otp-icon {
        width: 56px; height: 56px;
        background: rgba(11,138,111,0.12);
        border: 1px solid rgba(11,138,111,0.22);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 16px;
        position: relative;
    }

    .otp-icon svg { color: #0FA882; }

    .otp-title {
        font-family: 'Clash Display', sans-serif;
        font-size: 22px; font-weight: 700;
        color: var(--white); letter-spacing: -0.03em;
        margin: 0 0 6px; position: relative;
    }

    .otp-text {
        font-size: 13px; color: rgba(255,255,255,0.38);
        margin: 0; line-height: 1.6; position: relative;
    }

    /* Body */
    .otp-body { padding: 28px 32px 32px; }

    /* OTP input */
    .otp-input {
        width: 100%;
        letter-spacing: 14px;
        font-family: 'Clash Display', sans-serif;
        font-size: 28px; font-weight: 700;
        text-align: center;
        padding: 14px 12px;
        border-radius: 14px;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--ink);
        margin-bottom: 8px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
    }

    .otp-input:focus {
        border-color: var(--teal);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(11,138,111,0.1);
    }

    .otp-input::placeholder {
        color: var(--border);
        letter-spacing: 10px;
    }

    .otp-hint {
        font-size: 11.5px; color: var(--ink-soft);
        text-align: center; margin-bottom: 20px;
    }

    /* Verify button */
    .btn-verify {
        width: 100%;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: linear-gradient(135deg, var(--teal) 0%, #0FA882 100%);
        color: white;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 15px; font-weight: 700;
        padding: 14px;
        border-radius: 12px;
        border: none; cursor: pointer;
        box-shadow: 0 4px 16px rgba(11,138,111,0.28);
        transition: all 0.18s ease;
        margin-bottom: 14px;
    }

    .btn-verify:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(11,138,111,0.4);
    }

    .btn-verify svg {
        width: 16px; height: 16px;
        fill: none; stroke: currentColor;
        stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Resend row */
    .resend-row {
        display: flex; align-items: center; justify-content: center;
        gap: 6px; margin-bottom: 16px;
        font-size: 13px; color: var(--ink-soft);
    }

    .btn-resend {
        background: none; border: none; padding: 0;
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 13px; font-weight: 700;
        color: var(--teal); cursor: pointer;
        transition: color 0.15s;
        display: inline-flex; align-items: center; gap: 4px;
    }

    .btn-resend:hover { color: var(--ink); }
    .btn-resend:disabled { color: var(--ink-soft); cursor: not-allowed; }

    .btn-resend svg {
        width: 13px; height: 13px;
        fill: none; stroke: currentColor;
        stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Countdown */
    #countdown {
        font-size: 13px; font-weight: 700;
        color: var(--ink-soft);
    }

    /* Divider */
    .otp-divider {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 14px;
    }

    .otp-divider::before, .otp-divider::after {
        content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .otp-divider span {
        font-size: 11px; color: var(--ink-soft);
        font-weight: 600; letter-spacing: 0.06em;
    }

    /* Back button */
    .btn-back {
        width: 100%;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        color: var(--ink-mid);
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 14px; font-weight: 600;
        padding: 12px; border-radius: 12px;
        text-decoration: none;
        transition: all 0.15s;
    }

    .btn-back:hover {
        border-color: var(--ink-mid);
        color: var(--ink);
        text-decoration: none;
    }

    .btn-back svg {
        width: 14px; height: 14px;
        fill: none; stroke: currentColor;
        stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }
</style>

<div class="otp-page">
  <div class="otp-card">

    <!-- Header -->
    <div class="otp-header">
      <div class="otp-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <h2 class="otp-title">Verify Your Email</h2>
      <p class="otp-text">We've sent a 6-digit code to your email.<br>Enter it below to complete registration.</p>
    </div>

    <!-- Body -->
    <div class="otp-body">
      <form method="POST" id="otpForm">
        <input type="text" name="otp" id="otpInput" class="otp-input" maxlength="6" placeholder="······" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required="" autofocus="">
        <p class="otp-hint">Code expires in 10 minutes</p>

        <button type="submit" class="btn-verify">
          <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Verify &amp; Create Account
        </button>
      </form>

      <!-- Resend -->
      <div class="resend-row">
        Didn't receive it?
        <form method="POST" action="/resend_otp" id="resendForm" style="display:inline;">
          <button type="submit" class="btn-resend" id="resendBtn" disabled="">
            <svg viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            <span id="resendLabel">Resend in <span id="countdown">30s</span></span>
          </button>
        </form>
      </div>

      <div class="otp-divider"><span>or</span></div>

      <!-- Back -->
      <a href="https://javascript:history.back()" class="btn-back">
        <svg viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Go Back
      </a>

    </div>
  </div>
</div>

<p>

{% endblock %}
</p></body></html>
