{% extends "base.html" %}
{% block content %}

<style>
    .feedback-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
    }
    
    .feedback-card {
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
    }
    
    .card-header {
        background: linear-gradient(135deg, var(--saffron), var(--saffron-2));
        padding: 30px;
        text-align: center;
        color: white;
    }
    
    .card-header h2 {
        font-family: 'Clash Display', sans-serif;
        font-size: 28px;
        margin: 0 0 8px;
    }
    
    .card-body {
        padding: 32px;
    }
    
    .rating-input {
        display: flex;
        flex-direction: row-reverse;
        justify-content: center;
        gap: 10px;
        margin: 20px 0;
    }
    
    .rating-input input {
        display: none;
    }
    
    .rating-input label {
        font-size: 40px;
        cursor: pointer;
        color: #ddd;
        transition: color 0.2s;
    }
    
    .rating-input label:hover,
    .rating-input label:hover ~ label,
    .rating-input input:checked ~ label {
        color: var(--saffron);
    }
    
    .form-group {
        margin-bottom: 24px;
    }
    
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--ink-mid);
    }
    
    input, textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 14px;
        transition: all 0.2s;
    }
    
    input:focus, textarea:focus {
        outline: none;
        border-color: var(--saffron);
    }
    
    textarea {
        resize: vertical;
        min-height: 150px;
    }
    
    .btn-submit {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--saffron), var(--saffron-2));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(232,114,12,0.3);
    }
    
    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--ink-soft);
        text-decoration: none;
    }
</style>

<div class="feedback-container">
    <div class="feedback-card">
        <div class="card-header">
            <h2>✍️ Share Your Experience</h2>
            <p>Your feedback helps us improve and helps other students find the right tutor</p>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="rating-input">
                    <input type="radio" name="rating" id="star5" value="5" required>
                    <label for="star5">★</label>
                    <input type="radio" name="rating" id="star4" value="4">
                    <label for="star4">★</label>
                    <input type="radio" name="rating" id="star3" value="3">
                    <label for="star3">★</label>
                    <input type="radio" name="rating" id="star2" value="2">
                    <label for="star2">★</label>
                    <input type="radio" name="rating" id="star1" value="1">
                    <label for="star1">★</label>
                </div>
                
                <div class="form-group">
                    <label>What would you like to share? (Optional)</label>
                    <input type="text" name="title" placeholder="e.g., Great Experience with Maths Tutor">
                </div>
                
                <div class="form-group">
                    <label>Your Feedback *</label>
                    <textarea name="description" placeholder="Tell us about your experience with HomeTutorHub..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Submit Feedback</button>
            </form>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>
</div>

{% endblock %}
